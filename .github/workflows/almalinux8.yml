---
name: almalinux8

on:
  pull_request:
  push:
    paths:
      - 'almalinux8/**'
      - '.github/workflows/almalinux8.yml'
  schedule:
    - cron: '10 6,15 * * 1,6'
  workflow_dispatch:

permissions: write-all

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  test:
    name: Test almalinux8
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v7

      - name: Test building image.
        run: cd almalinux8 && docker build -t almalinux8 .

      - name: Run the built image.
        run: docker run --name test-container -d --privileged -v /sys/fs/cgroup:/sys/fs/cgroup:rw almalinux8

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v7
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ github.repository }}:almalinux8
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image.
        uses: docker/build-push-action@v7
        with:
          context: almalinux8/
          sbom: true
          provenance: mode=max
          file: almalinux8/Dockerfile
          platforms: linux/amd64, linux/arm64, linux/ppc64le, linux/s390x
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ github.repository }}:almalinux8, ${{ github.repository }}:almalinux8_latest
          labels: ${{ steps.meta.outputs.labels }}